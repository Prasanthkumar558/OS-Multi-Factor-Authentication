<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SecureOS Module</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .dashboard-container {
            max-width: 800px;
            text-align: center;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .os-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        .stat-card {
            background: rgba(0,0,0,0.2);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-accent);
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2" style="background: #38bdf8;"></div>

    <div class="glass-panel dashboard-container">
        <div class="status-badge">Secure OS Shell Executed</div>
        <h1 class="title" style="font-size: 40px; margin-bottom: 16px;">Welcome, {{ username }}!</h1>
        <p style="font-size: 16px;">You have successfully bypassed the two-factor authentication array.<br>Buffer constraints enabled. Trapdoors mitigated.</p>
        
        <div class="os-stats">
            <div class="stat-card">
                <div class="stat-value">0</div>
                <div class="stat-label">Buffer Overflows</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">100%</div>
                <div class="stat-label">MFA Integrity</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">Active</div>
                <div class="stat-label">Session State</div>
            </div>
        </div>
        
        <div style="margin-top: 40px;">
            <a href="/logout" class="btn" style="display: inline-block; width: auto; padding: 14px 40px; text-decoration: none;">Execute Secure Logout</a>
        </div>
    </div>
</body>
</html>
